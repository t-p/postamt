name: Deploy Email Infrastructure

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deployment (skip diff check)"
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: eu-west-1
  NODE_VERSION: "22"
  CDK_VERSION: "2.x"
  DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
  CDK_DISABLE_TELEMETRY: 1

permissions:
  id-token: write # Required for OIDC
  contents: read # Required for checkout
  pull-requests: write # Required for PR comments

jobs:
  # Security scanning job - runs first
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for infrastructure changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            infrastructure:
              - 'infrastructure/**'
              - 'backend/**'
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - '.github/workflows/deploy-infrastructure.yml'

      - name: Setup Node.js
        if: steps.changes.outputs.infrastructure == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.infrastructure == 'true'
        run: npm ci

      - name: Run security audit
        if: steps.changes.outputs.infrastructure == 'true'
        run: npm audit --audit-level=high

      - name: CDK Security Analysis
        if: steps.changes.outputs.infrastructure == 'true'
        run: |
          # Run basic security checks
          echo "Running basic security analysis..."

          # Check for hardcoded secrets (basic pattern matching)
          echo "Scanning for potential secrets..."
          grep -r -i "password\|secret\|key\|token" . --include="*.ts" --include="*.js" | grep -v node_modules | grep -v ".git" || echo "No obvious secrets found"

          echo "Security scan completed"

  # Validation job
  validate:
    name: Validate Infrastructure
    runs-on: ubuntu-latest
    needs: security-scan
    outputs:
      changes-detected: ${{ steps.changes.outputs.infrastructure }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for infrastructure changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            infrastructure:
              - 'infrastructure/**'
              - 'backend/**'
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - '.github/workflows/deploy-infrastructure.yml'

      - name: Setup Node.js
        if: steps.changes.outputs.infrastructure == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.infrastructure == 'true'
        run: npm ci

      - name: Lint TypeScript
        if: steps.changes.outputs.infrastructure == 'true'
        run: npm run lint

      - name: Verify AWS Region Configuration
        if: steps.changes.outputs.infrastructure == 'true'
        run: |
          echo "Verifying AWS region configuration for ${{ env.AWS_REGION }}..."
          if ! grep -q "${{ env.AWS_REGION }}" infrastructure/bin/infrastructure.ts; then
            echo "ERROR: CDK app not configured for ${{ env.AWS_REGION }}"
            exit 1
          fi
          echo "Region configuration verified"

      - name: Build TypeScript
        if: steps.changes.outputs.infrastructure == 'true'
        run: npm run build

      - name: Run tests
        if: steps.changes.outputs.infrastructure == 'true'
        run: npm test

      - name: Cache build artifacts
        if: steps.changes.outputs.infrastructure == 'true'
        uses: actions/cache@v3
        with:
          path: |
            infrastructure/lib/**/*.js
            infrastructure/bin/**/*.js
            backend/**/*.js
            node_modules
          key: build-${{ github.sha }}

  # CDK diff job for pull requests
  diff:
    name: CDK Diff
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' && needs.validate.outputs.changes-detected == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-CDKDiff
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Restore build cache
        uses: actions/cache@v3
        with:
          path: |
            infrastructure/lib/**/*.js
            infrastructure/bin/**/*.js
            backend/**/*.js
            node_modules
          key: build-${{ github.sha }}

      - name: Install dependencies (if cache miss)
        run: npm ci

      - name: Build (if cache miss)
        run: npm run build

      - name: Install AWS CDK
        run: npm install -g aws-cdk@${{ env.CDK_VERSION }}

      - name: CDK Diff
        id: diff
        run: |
          echo "# CDK Diff Results" > diff-output.md
          echo "" >> diff-output.md
          echo "\`\`\`diff" >> diff-output.md
          cdk diff StorageStack EmailStack WebmailStack 2>&1 | tee -a diff-output.md || true
          echo "\`\`\`" >> diff-output.md

      - name: Comment PR with diff
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diffOutput = fs.readFileSync('diff-output.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('CDK Diff Results')
            );

            const commentBody = `## Infrastructure Changes

            ${diffOutput}

            ---
            *This comment will be automatically updated when you push new commits.*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

  # Deploy to production
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: https://console.aws.amazon.com/ses/home?region=eu-west-1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Restore build cache
        uses: actions/cache@v3
        with:
          path: |
            infrastructure/lib/**/*.js
            infrastructure/bin/**/*.js
            backend/**/*.js
            node_modules
          key: build-${{ github.sha }}

      - name: Install dependencies (if cache miss)
        run: npm ci

      - name: Build (if cache miss)
        run: npm run build

      - name: Install AWS CDK
        run: npm install -g aws-cdk@${{ env.CDK_VERSION }}

      - name: CDK Diff (Safety Check)
        if: github.event.inputs.force_deploy != 'true'
        run: |
          echo "Running safety diff..."
          cdk diff StorageStack EmailStack WebmailStack || true

      - name: CDK Bootstrap (if needed)
        run: |
          echo "Bootstrapping CDK in ${{ env.AWS_REGION }}..."
          cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ env.AWS_REGION }}

      - name: CDK Deploy
        env:
          FORWARDING_RULES: ${{ secrets.FORWARDING_RULES }}
        run: |
          echo "Deploying email infrastructure..."
          cdk deploy StorageStack EmailStack WebmailStack --require-approval never --quiet || {
              echo "Deployment failed. Checking CloudFormation events..."
              aws cloudformation describe-stack-events \
                --stack-name StorageStack \
                --region ${{ env.AWS_REGION }} \
                --max-items 20 \
                --query 'StackEvents[?ResourceStatus==`CREATE_FAILED` || ResourceStatus==`UPDATE_FAILED`].[LogicalResourceId,ResourceType,ResourceStatusReason]' \
                --output table || echo "Could not retrieve StorageStack events"
              aws cloudformation describe-stack-events \
                --stack-name EmailStack \
                --region ${{ env.AWS_REGION }} \
                --max-items 20 \
                --query 'StackEvents[?ResourceStatus==`CREATE_FAILED` || ResourceStatus==`UPDATE_FAILED`].[LogicalResourceId,ResourceType,ResourceStatusReason]' \
                --output table || echo "Could not retrieve EmailStack events"
              aws cloudformation describe-stack-events \
                --stack-name WebmailStack \
                --region ${{ env.AWS_REGION }} \
                --max-items 20 \
                --query 'StackEvents[?ResourceStatus==`CREATE_FAILED` || ResourceStatus==`UPDATE_FAILED`].[LogicalResourceId,ResourceType,ResourceStatusReason]' \
                --output table || echo "Could not retrieve WebmailStack events"
              exit 1
            }

      - name: Post-deployment validation
        run: |
          echo "Validating deployment..."

          # Check if stacks exist and are in good state
          for STACK_NAME in StorageStack EmailStack WebmailStack; do
            STACK_STATUS=$(aws cloudformation describe-stacks \
              --stack-name $STACK_NAME \
              --region ${{ env.AWS_REGION }} \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo "STACK_NOT_FOUND")

            if [[ "$STACK_STATUS" != "CREATE_COMPLETE" && "$STACK_STATUS" != "UPDATE_COMPLETE" ]]; then
              echo "ERROR: Stack $STACK_NAME is in unexpected state: $STACK_STATUS"
              exit 1
            fi
            echo "$STACK_NAME: $STACK_STATUS"
          done

          echo "All deployments validated successfully"

      - name: Run Infrastructure Tests
        run: |
          echo "Running infrastructure tests..."
          if [ -f "./scripts/test-email-infrastructure.sh" ]; then
            ./scripts/test-email-infrastructure.sh ${{ env.DOMAIN_NAME }} || echo "WARNING: Some tests failed - check output above"
          else
            echo "WARNING: Test script not found"
          fi

  # Cleanup job for failed deployments
  cleanup-on-failure:
    name: Cleanup Failed Deployment
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure() && needs.deploy.result == 'failure'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-Cleanup
          aws-region: ${{ env.AWS_REGION }}

      - name: Check and report deployment status
        run: |
          echo "Checking deployment status..."

          # Check all stack statuses
          for STACK_NAME in StorageStack EmailStack WebmailStack; do
            STACK_STATUS=$(aws cloudformation describe-stacks \
              --stack-name $STACK_NAME \
              --region ${{ env.AWS_REGION }} \
              --query 'Stacks[0].StackStatus' \
              --output text 2>/dev/null || echo "STACK_NOT_FOUND")

            echo "$STACK_NAME status: $STACK_STATUS"

            if [[ "$STACK_STATUS" == *"FAILED"* ]] || [[ "$STACK_STATUS" == *"ROLLBACK"* ]]; then
              echo "WARNING: $STACK_NAME is in a failed state. Manual intervention may be required."
            fi
          done

          echo "CloudFormation Console: https://console.aws.amazon.com/cloudformation/home?region=${{ env.AWS_REGION }}"
